owner: Tediware
repo: tediware-upptime

sites:
  - name: Tediware
    url: https://tediware.com/
    # Retry a failed check up to 5 times with exponential backoff (~31s window)
    # before declaring the site down, instead of the default 3 (~7s). Guards
    # against transient code:0 false positives from the GitHub Actions runner
    # (momentary DNS/TLS/network blips), like the 2026-06-10 false outage.
    maxRetries: 5

assignees:
  - adriand

status-website:
  cname: status.tediware.com
  name: Tediware Status
  introTitle: "**Tediware** uptime monitor and status page."
  introMessage: Real-time uptime and response-time data for tediware.com, powered by [Upptime](https://upptime.js.org).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
